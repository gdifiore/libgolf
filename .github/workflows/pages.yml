name: Deploy GitHub Pages site

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'examples/web/**'
      - 'wasm/**'
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Jekyll site + wasm demo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Render README.md (and any other markdown) into _site/ via the default
      # GitHub Pages Jekyll setup. This preserves the auto-generated README
      # site that "Deploy from a branch" used to produce.
      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Configure CMake (wasm preset)
        run: cmake --preset wasm

      - name: Build wasm
        run: cmake --build --preset wasm

      - name: Stage demo at /demo/
        # jekyll-build-pages runs in a container as a different UID, so _site/
        # is owned by that user. Reclaim ownership before writing into it.
        run: |
          sudo chown -R "$USER:$USER" _site
          mkdir -p _site/demo
          cp examples/web/index.html _site/demo/
          cp build-wasm/libgolf_wasm.js _site/demo/
          cp build-wasm/libgolf_wasm.wasm _site/demo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
