name: Deploy GitHub Pages site

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'examples/web/**'
      - 'wasm/**'
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Jekyll site + wasm demo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v16

      - name: Configure CMake (wasm preset)
        run: cmake --preset wasm

      - name: Build wasm
        run: cmake --build --preset wasm

      # Stage the demo into the working tree so Jekyll picks it up as static
      # content during the render. Files without YAML front matter are copied
      # verbatim, so index.html, libgolf_wasm.js, and the .wasm binary all
      # land at _site/demo/ unchanged.
      - name: Stage demo at ./demo/
        run: |
          mkdir -p demo
          cp examples/web/index.html demo/
          cp build-wasm/libgolf_wasm.js demo/
          cp build-wasm/libgolf_wasm.wasm demo/

      # Renders README.md (and the staged demo/ tree) into _site/. This is the
      # same default-Jekyll setup that "Deploy from a branch" used to run.
      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
