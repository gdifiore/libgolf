name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: libgolf.a
            archive_ext: tar.gz
            platform: Linux
          - os: macos-latest
            artifact_name: libgolf.a
            archive_ext: tar.gz
            platform: macOS
          - os: windows-latest
            artifact_name: golf.lib
            archive_ext: zip
            platform: Windows

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package headers and library (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p package/include
          cp -r include/* package/include/
          cp build/include/version.hpp package/include/
          cp build/${{ matrix.artifact_name }} package/
          cd package
          tar -czf ../libgolf-${{ matrix.platform }}-${{ steps.get_version.outputs.version }}.tar.gz .

      - name: Package headers and library (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p package/include
          cp -r include/* package/include/
          cp build/include/version.hpp package/include/
          cp build/Release/${{ matrix.artifact_name }} package/
          cd package
          7z a ../libgolf-${{ matrix.platform }}-${{ steps.get_version.outputs.version }}.zip .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: libgolf-${{ matrix.platform }}-${{ steps.get_version.outputs.version }}.${{ matrix.archive_ext }}
          body: |
            ## libgolf ${{ steps.get_version.outputs.version }}

            ### Installation
            Download the appropriate binary for your platform below.

            ### Building from Source
            See the [README](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md) for build instructions.

  build-wasm:
    name: Build WebAssembly
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Configure CMake (wasm preset)
        run: cmake --preset wasm

      - name: Build
        run: cmake --build --preset wasm

      - name: Package wasm artifacts
        run: |
          mkdir -p package
          cp build-wasm/libgolf_wasm.js package/
          cp build-wasm/libgolf_wasm.wasm package/
          cd package
          zip ../libgolf-wasm-${{ steps.get_version.outputs.version }}.zip .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: libgolf-wasm-${{ steps.get_version.outputs.version }}.zip
